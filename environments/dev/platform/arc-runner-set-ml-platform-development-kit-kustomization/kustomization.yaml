apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: platform

commonLabels:
  app.kubernetes.io/part-of: ml-platform-development-kit
  app.kubernetes.io/component: ci
  app.kubernetes.io/name: arc-runner-set-ml-platform-development-kit

resources:
  # Kustomize git syntax: `<repo>//<path-in-repo>?ref=<branch|tag|sha>`.
  # The double slash means "use this subdirectory from that Git repository".
  - github.com/Gitarzysta92/platform-development-kit//cluster/arc/runner-scale-set-application?ref=main

patches:
  - patch: |-
      - op: replace
        path: /metadata/name
        value: arc-runner-set-ml-platform-development-kit
      - op: replace
        path: /spec/project
        value: ml-platform-development-kit
      - op: replace
        path: /spec/destination/namespace
        value: ml-platform-development-kit
      - op: replace
        path: /spec/source/helm/valuesObject/githubConfigUrl
        value: https://github.com/Gitarzysta92/ml-platform-development-kit
      - op: replace
        path: /spec/source/helm/valuesObject/githubConfigSecret
        value: arc-github-auth-ml-platform-development-kit
      - op: replace
        path: /spec/source/helm/valuesObject/runnerScaleSetName
        value: arc-runner-set-ml-platform-development-kit
      - op: replace
        path: /spec/source/helm/valuesObject/maxRunners
        value: 4
    target:
      kind: Application
      name: arc-runner-set-client

