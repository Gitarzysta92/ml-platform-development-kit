apiVersion: v1
kind: Service
metadata:
  name: mlflow
  labels:
    app: mlflow
    app.kubernetes.io/part-of: ml-platform
spec:
  selector:
    app: mlflow
  ports:
    - name: http
      port: 5000
      targetPort: 5000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mlflow
  labels:
    app: mlflow
    app.kubernetes.io/name: mlflow
    app.kubernetes.io/part-of: ml-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mlflow
  template:
    metadata:
      labels:
        app: mlflow
    spec:
      containers:
        - name: mlflow
          image: ghcr.io/mlflow/mlflow:v2.20.0
          imagePullPolicy: IfNotPresent
          args:
            - mlflow
            - server
            - --host
            - 0.0.0.0
            - --port
            - "5000"
            - --backend-store-uri
            - sqlite:////mlflow/db/mlflow.db
            - --default-artifact-root
            - /mlflow/artifacts
            - --gunicorn-opts
            - --workers=1 --timeout=120
          ports:
            - name: http
              containerPort: 5000
          startupProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 24
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 6
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: db
              mountPath: /mlflow/db
            - name: artifacts
              mountPath: /mlflow/artifacts
      volumes:
        - name: db
          persistentVolumeClaim:
            claimName: mlflow-db
        - name: artifacts
          persistentVolumeClaim:
            claimName: mlflow-artifacts
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mlflow-db
  labels:
    app.kubernetes.io/part-of: ml-platform
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mlflow-artifacts
  labels:
    app.kubernetes.io/part-of: ml-platform
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi

